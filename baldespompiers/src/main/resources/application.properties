spring.application.name=baldespompiers

server.port=8080

# ── Simulateur ──────────────────────────────────
# :8083 = serveur de test (sans points)  |  :8081 = prod (points comptés)
simulator.base-url=http://tp.cpe.fr:8081
simulator.username=CHANGE_ME
simulator.password=CHANGE_ME

# ── Session ─────────────────────────────────────
# Mis à jour dynamiquement au démarrage par WorkSessionService
simulator.team-uuid=7654e109-5030-4445-8eb2-e8ef54299c2e
simulator.token=7654e109-5030-4445-8eb2-e8ef54299c2e


# ── Polling ─────────────────────────────────────
poller.interval-ms=3000

# ── Déplacement véhicules ────────────────────────
# Intervalle entre deux PUT /vehicle/move (ms)

#movement.step-interval-ms=1000 pas de vitesse pr l'instant
# "teleport" | "straight" | "road"
movement.mode=road
movement.step.size=0.0005
movement.step.delay.ms=250
movement.fire.check.delay.ms=1000

# ── OSRM (routage réel) ───────────────
osrm.base-url=https://router.project-osrm.org

# ── Poids du vehicleScore (normalisés — somme = 1.0) ─────────────────────────
# Formules :
#   vehicleNorm   = VehicleType.efficiency[FIRE/EVENT] × (crewMember / crewCapacity) / 50
#   liquidScore   = LiquidType.efficiency(fireType)          ex. WATER/A=0.8, FOAM/B=1.0
#   distanceScore = 1 / (1 + dist_degrés / d-ref)           courbe hyperbole, jamais négatif
#   liquidRatio   = currentLiquid / liquidCapacity
#   fuelRatio     = currentFuel   / fuelCapacity

# 0,4 car c'est le critère le plus discriminant (efficacité du véhicule + équipage)
dispatch.w-vehicle=0.40 
# 0,3 pour le liquide qui est aussi très important
dispatch.w-liquid=0.30
#0,2 pour la distance qui est un facteur de temps ;
dispatch.w-distance=0.20
#  0,07 pour le ratio de liquide restant (préférer un réservoir plein)
dispatch.w-liquid-ratio=0.07
# 0,03 pour le ratio de carburant (moins critique que le liquide, mais à ne pas négliger).
dispatch.w-fuel=0.03
# Seuil de référence pour la courbe hyperbole, en DEGRÉS (≈ 0.018° ≈ 2 km à la latitude de Lyon), 2km car c'est un rayon d'action raisonnable pour un feu, au-delà on perd la moitié des points de distance, et à 10 km on n'en a plus que 17% (1/(1+10/2)=0.17).
# À d=0 → score=1.0 | À d=d-ref → score=0.5 | À d=5×d-ref → score=0.17
dispatch.d-ref=0.018

# ── vehicleScore (FireService) — score ∈ [0, 1.0] ──────────────────────────────────────────────────────────────────────────────
#┌──────────────────────────────────┬──────────────┬────────┬──────────────────────────────────────────────────────────────────┐
#│ Paramètre                        │ Plage        │ Poids  │ Justification                                                    │
#├──────────────────────────────────┼──────────────┼────────┼──────────────────────────────────────────────────────────────────┤
#│ vehicleNorm (effic[FIRE]×crew/50)│ [0.0, 1.0]   │ ×0.40  │ Formule du sujet : atténuation réelle sur site                   │
#│ liquidScore (liquid/fireType)    │ [0.0, 1.0]   │ ×0.30  │ Mauvais liquide → score effondré ; vecteur de discrimination fort │
#│ distanceScore 1/(1+d/d-ref)      │ (0.0, 1.0]   │ ×0.20  │ Hyperbole en degrés — jamais négatif, à 2 km → 0.5               │
#│ liquidRatio (réservoir%)         │ [0.0, 1.0]   │ ×0.07  │ Préférer un réservoir plein ; vides déjà éliminés en go/no-go    │
#│ fuelRatio (carburant%)           │ [0.0, 1.0]   │ ×0.03  │ Critiques éliminés en go/no-go, pondération résiduelle légère    │
#└──────────────────────────────────┴──────────────┴────────┴──────────────────────────────────────────────────────────────────┘
# ── eventScore (RPEventService) — score ∈ [0, ~0.63] (pas de liquide) ──────────────────────────────────────────────────────────
#┌──────────────────────────────────┬──────────────┬────────┬──────────────────────────────────────────────────────────────────┐
#│ vehicleNorm (effic[eventType]    │ [0.0, 1.0]   │ ×0.40  │ Ambulance vs camion — discriminant dominant pour les events      │
#│            ×crew/20)             │              │        │ MAX_EVENT_EFFICIENCY=20 (EMERGENCY_AMBULANCE sur ROAD/INJURY/MISC)│
#│ distanceScore 1/(1+d/d-ref)      │ (0.0, 1.0]   │ ×0.20  │ Même hyperbole que le feu                                        │
#│ fuelRatio (carburant%)           │ [0.0, 1.0]   │ ×0.03  │ Idem feu — pondération résiduelle                                │
#└──────────────────────────────────┴──────────────┴────────┴──────────────────────────────────────────────────────────────────┘

# ── Seuils d'abandon de mission ──────────────────────────
dispatch.give_up.fuel=10.0
dispatch.give_up.liquid=0.0
# Feux dont l'intensité est <= ce seuil sont laissés aux autres équipes (stratégie)
dispatch.abandon.intensity=0    
# Seuils de distance de dépriorisation des feux qui se font éteindre par d'autres équipes (stratégie)
dispatch.nearby-waypoints=100
# ── Seuils de dispatch ──────────────────────────
# En dessous de ces valeurs, le véhicule est écarté au profit d'un autre
# pour partir de la caserne. Si aucun véhicule n'est au-dessus de ces seuils, on accepte le meilleur disponible.
dispatch.min.fuel=30.0
dispatch.min.liquid=30.0
# pour les nouvelles missions, on peut être moins exigeant (stratégie), gain de temps
dispatch.min.fuelForNewMission=15.0
dispatch.min.liquidForNewMission=15
dispatch.min.crew=1
# Seuil "prêt" : on préfère envoyer un véhicule au-dessus de cette valeur.
# Si aucun n'est disponible, on accepte tout véhicule > min (seuil ci-dessus).
dispatch.ready.fuel=40.0
dispatch.ready.liquid=40.0
dispatch.ready.crew=3

# ── CORS ────────────────────────────────────────
cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://localhost:63342,http://localhost:8000

# ── Logs ────────────────────────────────────────
logging.level.cpe.baldespompiers=DEBUG
logging.level.org.springframework.web=INFO

# Inclure le message d'erreur dans les réponses 4xx/5xx (debug)
server.error.include-message=always
server.error.include-binding-errors=always