<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js" defer></script>
  <script src="../js/config.js" defer></script>
  <script src="../js/api.js" defer></script>
  <script src="../js/header.js" defer></script>
  <script src="../js/vehicles.js" defer></script>
</head>
<body class="bg-gray-100">
<div id="header"></div>

<div class="p-6 flex gap-6">

  <!-- Liste des véhicules -->
  <div class="flex-1 bg-white rounded-xl shadow p-6">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold">Mes véhicules</h2>
      <button id="recall-btn" onclick="recallAllVehicles()" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold rounded px-4 py-2 text-sm">
        🏠 Rappeler à la caserne
      </button>
    </div>
    <p id="recall-status" class="text-sm text-gray-500 mb-3"></p>
    <div id="vehicle-list" class="flex flex-col gap-3">
      <p class="text-gray-400">Chargement...</p>
    </div>
  </div>

  <!-- Créer un véhicule -->
  <div class="w-80 bg-white rounded-xl shadow p-6">
    <h2 class="text-xl font-bold mb-4">Créer un véhicule</h2>

    <div class="flex flex-col gap-3">
      <label class="flex flex-col gap-1 text-sm font-medium">
        Type
        <select id="type" class="border rounded p-2">
          <option>CAR</option>
          <option>FIRE_ENGINE</option>
          <option>PUMPER_TRUCK</option>
          <option>WATER_TENDERS</option>
          <option>TURNTABLE_LADDER_TRUCK</option>
          <option>TRUCK</option>
          <option>EMERGENCY_AMBULANCE</option>
        </select>
      </label>

      <label class="flex flex-col gap-1 text-sm font-medium">
        Liquide
        <select id="liquidType" class="border rounded p-2">
          <option>ALL</option>
          <option>WATER</option>
          <option>POWDER</option>
          <option>SPECIAL_POWDER</option>
          <option>CARBON_DIOXIDE</option>
          <option>FOAM</option>
        </select>
      </label>

      <label class="flex flex-col gap-1 text-sm font-medium">
        Équipage
        <input id="crewMember" type="number" value="4" class="border rounded p-2"/>
      </label>

      <button onclick="submitCreateVehicle()" class="bg-orange-500 hover:bg-orange-600 text-white font-semibold rounded p-2 mt-2">
        Créer
      </button>

      <p id="create-status" class="text-sm text-center text-gray-500"></p>
    </div>
  </div>

</div>

<!-- Modal édition véhicule -->
<div id="edit-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
  <div class="bg-white rounded-xl shadow-xl p-6 w-96">
    <h2 class="text-xl font-bold mb-4">Modifier véhicule <span id="edit-vehicle-id"></span></h2>
    <div class="flex flex-col gap-3">
      <label class="flex flex-col gap-1 text-sm font-medium">
        Type de liquide
        <select id="edit-liquidType" class="border rounded p-2">
          <option>ALL</option>
          <option>WATER</option>
          <option>POWDER</option>
          <option>SPECIAL_POWDER</option>
          <option>CARBON_DIOXIDE</option>
          <option>FOAM</option>
        </select>
      </label>
      <label class="flex flex-col gap-1 text-sm font-medium">
        Équipage
        <input id="edit-crewMember" type="number" min="0" class="border rounded p-2"/>
      </label>
      <div class="flex gap-2 mt-2">
        <button onclick="submitEditVehicle()" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-semibold rounded p-2">
          Sauvegarder
        </button>
        <button onclick="closeEditModal()" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold rounded p-2">
          Annuler
        </button>
      </div>
      <p id="edit-status" class="text-sm text-center text-gray-500"></p>
    </div>
  </div>
</div>

</body>
</html>
